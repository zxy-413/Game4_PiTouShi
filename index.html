<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- 自动获取Player Settings里的Product Name -->
    <title>PiTouShi</title>
    
    <!-- 引入像素风字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
      /* 全局基础设置 */
      body {
        background-color: #1a1a1a; /* 复古暗色背景 */
        color: #e0e0e0;
        font-family: 'Press Start 2P', monospace; /* 应用像素字体 */
        text-align: center;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        box-sizing: border-box;
      }

      /* 游戏名称区域（上方） */
      .header {
        margin-bottom: 35px;
      }

      h1 {
        font-size: 40px;
        color: #ffcc00; 
        text-shadow: 5px 5px 0px #000;
        margin: 0;
        letter-spacing: 2px;
      }

      /* 游戏容器 - 自适应游戏原始尺寸，但添加最大尺寸限制 */
      #game-container {
        position: relative;
        background-color: #000;
        border: 4px solid #fff; 
        box-shadow: 8px 8px 0px #000;
        display: inline-block;
        /* 最大尺寸限制：最大宽度为视口宽度的95%，最大高度为视口高度的70% */
        max-width: 95vw;
        max-height: 70vh;
        /* 当容器被限制时，内部内容自动缩放适配 */
        overflow: auto;
      }

      /* Canvas - 保持原始像素尺寸，但当容器受限时允许等比缩放 */
      canvas {
        display: block;
        /* 原始宽高由 width/height 属性决定 */
        /* 当父容器有max限制时，canvas等比缩放，但不会拉伸变形 */
        max-width: 100%;
        max-height: 600px;
        width: auto;
        height: auto;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        image-rendering: pixelated; /* 保持像素风格 */
      }

      /* 制作者介绍区域（下方） */
      .footer {
        margin-top: 45px;
        font-size: 16px;
        color: #aaaaaa;
        line-height: 2.2;
        text-shadow: 2px 2px 0px #000;
      }

      .footer span.maker {
        color: #44aaff; 
      }

      /* 可选：如果视口非常小，调整一些间距 */
      @media (max-width: 640px) {
        h1 {
          font-size: 24px;
          text-shadow: 3px 3px 0px #000;
        }
        .footer {
          font-size: 10px;
          margin-top: 25px;
        }
        .header {
          margin-bottom: 20px;
        }
        body {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <!-- 游戏上方：游戏名 -->
    <div class="header">
      <h1>PiTouShi</h1>
    </div>

    <!-- 游戏中间：容器有最大尺寸限制，内部canvas等比缩放 -->
    <div id="game-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
    </div>

    <!-- 游戏下方：制作者介绍 -->
    <div class="footer">
      <div>DEVELOPED BY <span class="maker">Jiayi Xu, Xinyu Zhao</span></div>
      <div>v1.0</div>
    </div>

    <!-- Unity WebGL 启动脚本 (兼容 Unity 2020+) -->
    <script src="Build/Game4_PiTouShi.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var buildUrl = "Build";
      var config = {
        dataUrl: buildUrl + "/Game4_PiTouShi.data.unityweb",
        frameworkUrl: buildUrl + "/Game4_PiTouShi.framework.js.unityweb",
        codeUrl: buildUrl + "/Game4_PiTouShi.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Jiayi Xu, Xinyu Zhao",
        productName: "PiTouShi",
        productVersion: "1.0",
      };

      var script = document.createElement("script");
      script.src = config.frameworkUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
        }).then((unityInstance) => {
          console.log("Game loaded successfully!");
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
